<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Color You Need Now</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F3EC;
      --text: #272220;
      --chip: #EFE7DA;
      --line: rgba(39, 34, 32, 0.12);
      --white: #fffdf9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Jost", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .card {
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(39, 34, 32, 0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 0 0 28px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: rgba(39, 34, 32, 0.78);
    }

    .section {
      margin-bottom: 24px;
    }

    .label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      font-size: 0.98rem;
      outline: none;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      appearance: none;
      border: 1px solid transparent;
      background: var(--chip);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      border-color: rgba(39, 34, 32, 0.12);
    }

    .chip.active {
      background: var(--text);
      color: var(--bg);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 18px;
      font: inherit;
      font-size: 0.96rem;
      cursor: pointer;
      transition: 0.18s ease;
      background: var(--white);
      color: var(--text);
    }

    .btn.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .output {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .result-color {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.2rem, 7vw, 4.3rem);
      line-height: 1;
      margin: 0 0 10px;
    }

    .result-theme {
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(39, 34, 32, 0.58);
      margin-bottom: 14px;
    }

    .result-message {
      font-size: 1.18rem;
      line-height: 1.7;
      max-width: 32ch;
    }

    .muted {
      color: rgba(39, 34, 32, 0.56);
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 20px 14px 40px;
      }

      .card {
        border-radius: 22px;
        padding: 22px 16px;
      }

      .chip,
      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>The Color You Need Now</h1>
      <p class="sub">A minimal reading inspired by Four Pillars thinking.</p>

      <div class="section">
        <label class="label" for="birthDate">Birth Date</label>
        <input id="birthDate" class="input" type="date" />
      </div>

      <div class="section">
        <div class="label">Choose the one color you feel drawn to now</div>
        <div id="selectedColor" class="chips"></div>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn primary">See My Color</button>
        <button id="copyBtn" class="btn">Copy</button>
        <button id="clearBtn" class="btn">Clear</button>
      </div>

      <div class="output" id="output">
        <div id="reading">
          <div class="muted">Your result will appear here.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const colors = [
      "Midori",
      "Soft Blue",
      "Burgundy",
      "Burnt Orange",
      "Rakuda",
      "Ivory",
      "Grey/Silver",
      "Gold",
      "Sumi Black",
      "Dark Blue",
      "Sakura"
    ];

    const state = {
      selectedColor: ""
    };

    const readingEl = document.getElementById("reading");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");

    function renderColorChips() {
      const container = document.getElementById("selectedColor");
      container.innerHTML = "";

      colors.forEach((color) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = color;

        btn.addEventListener("click", () => {
          state.selectedColor = color;
          container.querySelectorAll(".chip").forEach((chip) => chip.classList.remove("active"));
          btn.classList.add("active");
        });

        container.appendChild(btn);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseResult(text) {
      const lines = text.split("\n");
      const result = { color: "", theme: "", message: "" };

      for (const line of lines) {
        if (line.startsWith("Color:")) {
          result.color = line.replace("Color:", "").trim();
        } else if (line.startsWith("Theme:")) {
          result.theme = line.replace("Theme:", "").trim();
        } else if (line.startsWith("Message:")) {
          result.message = line.replace("Message:", "").trim();
        }
      }

      return result;
    }

    function renderResult(text) {
      const { color, theme, message } = parseResult(text);

      readingEl.innerHTML = `
        <div class="result-color">${escapeHtml(color || "Ivory")}</div>
        <div class="result-theme">${escapeHtml(theme || "Return to balance")}</div>
        <div class="result-message">${escapeHtml(message || "Come back to what steadies you.")}</div>
      `;
    }

    renderColorChips();

    generateBtn.addEventListener("click", async () => {
      const birthDate = document.getElementById("birthDate").value;
      const selectedColor = state.selectedColor;

      if (!birthDate) {
        readingEl.innerHTML = `<div class="muted">Please enter your birth date.</div>`;
        return;
      }

      if (!selectedColor) {
        readingEl.innerHTML = `<div class="muted">Please choose one color.</div>`;
        return;
      }

      readingEl.innerHTML = `<div class="muted">Reading...</div>`;

      try {
        const response = await fetch("/api/generate-reading", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ birthDate, selectedColor })
        });

        const data = await response.json();
        renderResult(data.text || "Color: Ivory\nTheme: Return to balance\nMessage: Come back to what steadies you.");
      } catch (error) {
        renderResult("Color: Ivory\nTheme: Return to balance\nMessage: Come back to what steadies you.");
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = readingEl.innerText.trim();
      if (!text || text === "Your result will appear here.") return;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "Copied";
        setTimeout(() => {
          copyBtn.textContent = "Copy";
        }, 1200);
      } catch (error) {
        console.error("Copy failed:", error);
      }
    });

    clearBtn.addEventListener("click", () => {
      document.getElementById("birthDate").value = "";
      state.selectedColor = "";
      document.querySelectorAll(".chip").forEach((chip) => chip.classList.remove("active"));
      readingEl.innerHTML = `<div class="muted">Your result will appear here.</div>`;
    });
  </script>
</body>
</html>
