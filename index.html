<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Color You Need Now</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F3EC;
      --text: #272220;
      --accent: #8B6B3D;
      --chip: #EFE7DA;
      --line: rgba(39, 34, 32, 0.12);
      --white: #fffdf9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Jost", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .card {
      background: rgba(255,255,255,0.38);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(39, 34, 32, 0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.1rem, 6vw, 3.6rem);
      line-height: 0.96;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 0 0 28px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: rgba(39, 34, 32, 0.78);
    }

    .section {
      margin-bottom: 24px;
    }

    .label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      appearance: none;
      border: 1px solid transparent;
      background: var(--chip);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      border-color: rgba(39, 34, 32, 0.12);
    }

    .chip.active {
      background: var(--text);
      color: var(--bg);
    }

    .select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      font-size: 0.98rem;
      outline: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 18px;
      font: inherit;
      font-size: 0.96rem;
      cursor: pointer;
      transition: 0.18s ease;
      background: var(--white);
      color: var(--text);
    }

    .btn.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .output {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .output-label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(39, 34, 32, 0.56);
      margin-bottom: 14px;
    }

    .reading {
      min-height: 110px;
      white-space: pre-line;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(1.5rem, 4.4vw, 2.25rem);
      line-height: 1.4;
      letter-spacing: 0.01em;
    }

    .muted {
      color: rgba(39, 34, 32, 0.56);
      font-style: normal;
      font-size: 1rem;
      font-family: "Jost", sans-serif;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 20px 14px 40px;
      }

      .card {
        border-radius: 22px;
        padding: 22px 16px;
      }

      .chip,
      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>The Color You Need Now</h1>
      <p class="sub">A precise color reading based on what your presence quietly reveals.</p>

      <div class="section">
        <label class="label" for="ageRange">Age Range</label>
        <select id="ageRange" class="select">
          <option value="">Select</option>
          <option>10–20</option>
          <option>20–30</option>
          <option>30–40</option>
          <option>40–50</option>
          <option>50–60</option>
          <option>60–70</option>
          <option>70+</option>
        </select>
      </div>

      <div class="section">
        <div class="label">Visible Impression (choose up to 2)</div>
        <div id="visibleImpression" class="chips"></div>
      </div>

      <div class="section">
        <div class="label">Facial Expression (choose up to 2)</div>
        <div id="facialExpression" class="chips"></div>
      </div>

      <div class="section">
        <div class="label">Body Language (choose up to 2)</div>
        <div id="bodyLanguage" class="chips"></div>
      </div>

      <div class="section">
        <div class="label">Emotional Impression (choose up to 2)</div>
        <div id="emotionalImpression" class="chips"></div>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn primary">Generate Reading</button>
        <button id="copyBtn" class="btn">Copy Reading</button>
        <button id="clearBtn" class="btn">Clear</button>
      </div>

      <div class="output">
        <div class="output-label">Result</div>
        <div id="reading" class="reading">
          <span class="muted">Your color and message will appear here.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const options = {
      visibleImpression: [
        "Polished", "Warm", "Reserved", "Confident", "Elegant",
        "Mysterious", "Soft", "Powerful", "Approachable", "Intense"
      ],
      facialExpression: [
        "Calm", "Guarded", "Gentle", "Serious", "Kind",
        "Unreadable", "Observant", "Composed", "Tired but holding it together", "Slightly distant"
      ],
      bodyLanguage: [
        "Relaxed", "Controlled", "Upright", "Graceful", "Guarded",
        "Self-possessed", "Slightly tense", "Open", "Deliberate", "Quietly commanding"
      ],
      emotionalImpression: [
        "Holding back", "Longing to be seen", "Carrying a quiet sadness", "Deeply self-controlled",
        "Emotionally tired", "More sensitive than they appear", "Protecting their energy",
        "Ready for a shift", "Craving softness", "Used to being strong"
      ]
    };

    const state = {
      visibleImpression: [],
      facialExpression: [],
      bodyLanguage: [],
      emotionalImpression: []
    };

    function renderChips(containerId, items, key, max = 2) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      items.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = item;

        btn.addEventListener("click", () => {
          const current = state[key];
          const index = current.indexOf(item);

          if (index >= 0) {
            current.splice(index, 1);
            btn.classList.remove("active");
            return;
          }

          if (current.length >= max) return;

          current.push(item);
          btn.classList.add("active");
        });

        container.appendChild(btn);
      });
    }

    renderChips("visibleImpression", options.visibleImpression, "visibleImpression");
    renderChips("facialExpression", options.facialExpression, "facialExpression");
    renderChips("bodyLanguage", options.bodyLanguage, "bodyLanguage");
    renderChips("emotionalImpression", options.emotionalImpression, "emotionalImpression");

    const readingEl = document.getElementById("reading");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function typeWriter(text, speed = 28) {
      readingEl.textContent = "";
      const words = text.split(" ");
      for (let i = 0; i < words.length; i++) {
        readingEl.textContent += (i === 0 ? "" : " ") + words[i];
        await sleep(speed);
      }
    }

    generateBtn.addEventListener("click", async () => {
      const ageRange = document.getElementById("ageRange").value;

      readingEl.innerHTML = '<span class="muted">Reading...</span>';

      try {
        const response = await fetch("/api/generate-reading", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ageRange,
            visibleImpression: state.visibleImpression,
            facialExpression: state.facialExpression,
            bodyLanguage: state.bodyLanguage,
            emotionalImpression: state.emotionalImpression
          })
        });

        const data = await response.json();
        await typeWriter(data.text || "Color: Ivory\nMessage: You are not asking for more strength; you are asking for less to hold.");
      } catch (error) {
        readingEl.textContent = "Color: Charcoal\nMessage: You have been holding too much without letting anyone see the weight.";
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = readingEl.textContent.trim();
      if (!text || text === "Your color and message will appear here.") return;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "Copied";
        setTimeout(() => {
          copyBtn.textContent = "Copy Reading";
        }, 1200);
      } catch (_) {}
    });

    clearBtn.addEventListener("click", () => {
      document.getElementById("ageRange").value = "";
      Object.keys(state).forEach(key => state[key] = []);
      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      readingEl.innerHTML = '<span class="muted">Your color and message will appear here.</span>';
    });
  </script>
</body>
</html>
